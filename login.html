<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — PawHaven</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <a href="landing.html" class="auth-brand">
      <div class="brand-icon">🐾</div>
      <span>PawHaven</span>
    </a>

    <div class="auth-card">
      <div class="form-top">
        <h2>Welcome Back</h2>
        <p>Log in to manage your listings</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <p id="loginError" class="error-text" hidden></p>
        <button type="submit" class="add-btn">Log In →</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="auth.js"></script>
</body>
</html>
