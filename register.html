<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — PawHaven</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <a href="landing.html" class="auth-brand">
      <div class="brand-icon">🐾</div>
      <span>PawHaven</span>
    </a>

    <div class="auth-card">
      <div class="form-top">
        <h2>Create Your Account</h2>
        <p>Join PawHaven to list, track, or adopt a pet</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="e.g. Juan Dela Cruz" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="role">I am a...</label>
          <div class="sel-wrap">
            <select id="role">
              <option value="adopter">Adopter</option>
              <option value="volunteer">Volunteer / Rescuer</option>
              <option value="transporter">Pet Transporter</option>
            </select>
          </div>
        </div>
        <p id="registerError" class="error-text" hidden></p>
        <button type="submit" class="add-btn">＋ Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="auth.js"></script>
</body>
</html>
